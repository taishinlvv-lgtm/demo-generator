name: セバス デモ生成

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: node src/index.js

      - name: Commit and push
        run: |
          git config user.email "sebas@xmousytime.com"
          git config user.name "Sebas"
          git add docs/
          git diff --staged --quiet || git commit -m "デモ生成"
          git push