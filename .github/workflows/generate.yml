name: Demo Generator

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate demos
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
        run: node src/index.js
      - name: Commit generated demos
        run: |
          git config user.name "sebas-bot"
          git config user.email "sebas@xmousytime.local"
          git add docs/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "sebas demo $(Get-Date -Format yyyy-MM-dd)"
            git push
          fi
